    date_sel: "time, .date"
    summary_sel: ".field--name-field-chapeau, p"
    default_tags: ["facturation", "NGAP/CCAM", "convention"]
    default_profession_tags: ["orthophoniste"]
    active: true

  - name: "Ameli Pro — Orthoptistes"
    url: "https://www.ameli.fr/orthoptiste/actualites"
    kind: html
    category: officiel
