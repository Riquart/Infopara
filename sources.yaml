    default_tags: ["facturation", "NGAP/CCAM", "convention"]
    default_profession_tags: ["pedicure-podologue"]
    active: true

  - name: "HAS — Actualités"
    url: "https://www.has-sante.fr/jcms/c_5443/fr/rss"
    kind: rss
    category: officiel
    default_tags: ["réglementation", "formation/DPC"]
    default_profession_tags: []
    active: true

  - name: "ANS — Agence du Numérique en Santé"
    url: "https://esante.gouv.fr/rss.xml"
    kind: rss
    category: officiel
    default_tags: ["télétransmission/SESAM-Vitale", "logiciels-métier", "télésanté"]
    default_profession_tags: []
    active: true

  - name: "Ministère de la Santé — Espace presse"
    url: "https://sante.gouv.fr/actualites/presse/rss"
    kind: rss
