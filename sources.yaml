    title_sel: "h2, h3"
    link_sel: "a"
    date_sel: "time, .date"
    summary_sel: "p, .excerpt"
    default_tags: ["syndical", "ordre", "réglementation"]
    default_profession_tags: ["orthophoniste"]
    active: true

  - name: "ONPP — Ordre National des Pédicures-Podologues"
    url: "https://www.onpp.fr/actualites"
    kind: html
    category: ordre
    selector: "article, .news"
    title_sel: "h2, h3"
    link_sel: "a"
    date_sel: "time, .date"
    summary_sel: "p"
    default_tags: ["ordre", "réglementation"]
    default_profession_tags: ["pedicure-podologue"]
    active: true

