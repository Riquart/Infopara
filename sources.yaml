  - name: "Légifrance — JORF"
    url: "https://www.legifrance.gouv.fr/rss/jorf.xml"
    kind: rss
    category: officiel
    default_tags: ["JO/décrets", "réglementation"]
    default_profession_tags: []
    active: false
    # NOTE: 403 Cloudflare — accès bloqué aux bots. Désactivé.

  # ──────────────────────────────────────────────────────────────
  # ORDRES PROFESSIONNELS
  # ──────────────────────────────────────────────────────────────

  - name: "ONI — Ordre National des Infirmiers"
    url: "https://www.ordre-infirmiers.fr/"
    kind: html
    category: ordre
    selector: "article, .node--type-actualite, .views-row"
    title_sel: "h2, h3, .node__title"
    link_sel: "a"
    date_sel: "time, .date"
    summary_sel: "p, .field--name-body"
    default_tags: ["ordre", "réglementation"]
    default_profession_tags: ["infirmier"]
    active: true

  - name: "CNOMK — Ordre des Kinésithérapeutes"
    url: "https://www.ordremk.fr/actualites/ordre/"
    kind: html
    category: ordre
    selector: "article, .post"
    title_sel: "h2, h3, .entry-title"
    link_sel: "a"
    date_sel: "time, .entry-date, .post-date"
    summary_sel: ".entry-summary, p"
    default_tags: ["ordre", "réglementation"]
    default_profession_tags: ["kinesitherapeute"]
    active: true

  - name: "FNO — Fédération Nationale des Orthophonistes"
    url: "https://www.fno.fr/actualites/"
