# Sources de veille — auxiliaires médicaux libéraux en France
# kind: rss | html
# category: officiel | syndicat | ordre | presse | editeur
# Pour les sources HTML : selector = sélecteur CSS pointant sur les items (article, li...)
#   Sous-sélecteurs attendus dans chaque item :
#     title_sel, link_sel, date_sel (optionnel), summary_sel (optionnel)

sources:

  # ──────────────────────────────────────────────────────────────
  # OFFICIELS / INSTITUTIONNELS
  # ──────────────────────────────────────────────────────────────

  - name: "Ameli Pro — Infirmiers"
    url: "https://www.ameli.fr/infirmier/actualites"
    kind: html
    category: officiel
    selector: "article.node"
    title_sel: "h2.titre-actus, h3.titre-actus"
    link_sel: "h2.titre-actus a, h3.titre-actus a, a"
    date_sel: "time, .date"
    summary_sel: ".field--name-field-chapeau, p"
    default_tags: ["facturation", "NGAP/CCAM", "convention", "télétransmission/SESAM-Vitale"]
    default_profession_tags: ["infirmier"]
    active: true

  - name: "Ameli Pro — Kinésithérapeutes"
    url: "https://www.ameli.fr/masseur-kinesitherapeute/actualites"
    kind: html
    category: officiel
    selector: "article.node"
    title_sel: "h2.titre-actus, h3.titre-actus"
    link_sel: "h2.titre-actus a, h3.titre-actus a, a"
    date_sel: "time, .date"
    summary_sel: ".field--name-field-chapeau, p"
    default_tags: ["facturation", "NGAP/CCAM", "convention"]
    default_profession_tags: ["kinesitherapeute"]
    active: true

