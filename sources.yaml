  - name: "SNAO — Syndicat National Autonome des Orthoptistes"
    url: "https://www.snao.fr/actualites"
    kind: html
    category: syndicat
    selector: "article, .post, li.news"
    title_sel: "h2, h3"
    link_sel: "a"
    date_sel: "time, .date"
    summary_sel: "p"
    default_tags: ["syndical", "convention"]
    default_profession_tags: ["orthoptiste"]
