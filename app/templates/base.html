<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}VeilleAuxMed{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    .badge { @apply inline-flex items-center px-2 py-0.5 rounded text-xs font-medium; }
    [hx-indicator].htmx-request { opacity: 0.5; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 h-full flex flex-col">

  <!-- Navbar -->
  <nav class="bg-indigo-700 text-white shadow-md">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-6">
        <a href="/" class="font-bold text-lg tracking-tight">VeilleAuxMed</a>
        <a href="/" class="text-sm hover:text-indigo-200 {% if request.url.path == '/' %}underline{% endif %}">Dashboard</a>
        <a href="/sources" class="text-sm hover:text-indigo-200 {% if request.url.path == '/sources' %}underline{% endif %}">Sources</a>
      </div>
      <div class="flex items-center gap-3">
        <div id="refresh-status" class="text-sm"></div>
        <button
          hx-post="/refresh"
          hx-target="#refresh-status"
          hx-swap="innerHTML"
          hx-indicator="#refresh-spinner"
          class="bg-white text-indigo-700 font-semibold text-sm px-3 py-1.5 rounded hover:bg-indigo-50 transition">
          ↻ Refresh now
        </button>
        <span id="refresh-spinner" class="htmx-indicator text-xs text-indigo-200">⏳</span>
      </div>
    </div>
  </nav>

  <main class="flex-1 max-w-7xl mx-auto w-full px-4 py-6">
    {% block content %}{% endblock %}
  </main>

  <footer class="text-center text-xs text-gray-400 py-3 border-t">
    VeilleAuxMed — données issues de sources publiques — pas de génération IA
  </footer>
</body>
</html>
